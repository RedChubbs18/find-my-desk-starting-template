apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
---
# API Gateway/BFF Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-bff
  namespace: {{ .Values.namespace }}
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: api-gateway-bff
---
# Internal Services
apiVersion: v1
kind: Service
metadata:
  name: directory-service
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: directory-service
---
apiVersion: v1
kind: Service
metadata:
  name: neighbourhood-service
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 3002
  selector:
    app: neighbourhood-service
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 3003
    targetPort: 3003
  selector:
    app: booking-service
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 3004
    targetPort: 3004
  selector:
    app: recommendation-service
